# ============================================================
# 求职目标画像模板（profile.yaml）
# 复制本文件为 profile.yaml，按你的真实情况填写。
# 本 skill 全部逻辑（检索词 / 硬排除 / 评分门槛 / 破冰事实锚点）都读这个文件。
# 也可用 scripts/build_profile.py 从「简历 + 一句目标」自动抽草稿。
# ============================================================

meta:
  candidate_name: ""          # 仅用于破冰话术称呼，可空
  generated_at: ""            # 生成日期，便于回溯
  notes: ""

goal: ""                      # 原始目标句，例如：我想找 5 年以上经验、月薪 4 万以上的策略产品经理岗位

search:
  city: ""                    # 期望城市；空=不限
  queries:                    # 在 BOSS 搜索框实际输入的查询词（至少 1 个）
    - ""

thresholds:                   # 评分门槛：全部满足才「可收藏」；任一项空/0 = 该维度不限
  city: ""
  salary_floor: 0             # 月薪下限（元）
  seniority_years: 0          # 经验年限下限
  stage_allow: []             # 公司阶段白名单，如 ["成长期","不需要融资","未融资"]
  scale_max: 0                # 公司规模上限（人）
  employment_type: ""         # 全职 / 兼职 / 实习

hard_exclude:                 # 硬排除：命中任一关键词即「不入库不收藏」；只列你确实无经验的类
  - category: "示例-广告/IAA"
    keywords: ["IAA", "广告变现", "买量"]

boost_keywords:               # 加分关键词：JD 命中越多评分越高（用于排序，非否决）
  - ""

fact_anchors:                 # 事实锚点：破冰话术匹配源 + 自检 gate 的事实字典；必须真实可溯源
  - anchor: ""
    evidence: ""
